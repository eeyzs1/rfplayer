name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Remove local dependency overrides
        run: |
          python3 -c "
          lines = open('pubspec.yaml').readlines()
          result = []
          skip = False
          for line in lines:
              if line.startswith('dependency_overrides:'):
                  skip = True
                  continue
              if skip and line.strip() and not line[0].isspace():
                  skip = False
              if not skip:
                  result.append(line)
          open('pubspec.yaml', 'w').writelines(result)
          "

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Remove local dependency overrides
        run: |
          python3 -c "
          lines = open('pubspec.yaml').readlines()
          result = []
          skip = False
          for line in lines:
              if line.startswith('dependency_overrides:'):
                  skip = True
                  continue
              if skip and line.strip() and not line[0].isspace():
                  skip = False
              if not skip:
                  result.append(line)
          open('pubspec.yaml', 'w').writelines(result)
          "

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
