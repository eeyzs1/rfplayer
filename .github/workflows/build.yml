name: Build

on:
  push:
    branches: [main]

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (split per ABI)
        run: flutter build apk --split-per-abi --target-platform android-arm64,android-x64 --release

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: rfplayer-android-arm64-v8a
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: rfplayer-android-x86_64
          path: build/app/outputs/flutter-apk/app-x86_64-release.apk

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup -y
        shell: pwsh

      - name: Extract version from pubspec.yaml
        id: version
        shell: pwsh
        run: |
          $line = Select-String -Path pubspec.yaml -Pattern '^version:\s*(\S+)'
          $version = $line.Matches.Groups[1].Value.Split('+')[0]
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build Windows Installer
        run: ISCC /DMyAppVersion=${{ steps.version.outputs.version }} windows/installer.iss
        shell: pwsh

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: rfplayer-windows-installer
          path: build/windows/rfplayer_installer.exe

      - name: Upload Windows Release files
        uses: actions/upload-artifact@v4
        with:
          name: rfplayer-windows-release
          path: build/windows/x64/runner/Release/
