name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (split per ABI)
        run: flutter build apk --split-per-abi --target-platform android-arm64,android-x64 --release

      - name: Rename APKs
        run: |
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk rfplayer_installer_arm64-v8a.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk rfplayer_installer_x86_64.apk

      - name: Generate SHA256 checksums
        run: |
          sha256sum rfplayer_installer_arm64-v8a.apk rfplayer_installer_x86_64.apk > checksums_android.txt

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: rfplayer-android-arm64-v8a
          path: rfplayer_installer_arm64-v8a.apk

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: rfplayer-android-x86_64
          path: rfplayer_installer_x86_64.apk

      - name: Upload Android checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums-android
          path: checksums_android.txt

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup -y
        shell: pwsh

      - name: Extract version from pubspec.yaml
        id: version
        shell: pwsh
        run: |
          $line = Select-String -Path pubspec.yaml -Pattern '^version:\s*(\S+)'
          $version = $line.Matches.Groups[1].Value.Split('+')[0]
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build Windows Installer
        run: ISCC /DMyAppVersion=${{ steps.version.outputs.version }} windows/installer.iss
        shell: pwsh

      - name: Compress Windows build
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath rfplayer_installer.zip
        shell: pwsh

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $zipHash = (Get-FileHash rfplayer_installer.zip -Algorithm SHA256).Hash
          $exeHash = (Get-FileHash build/windows/rfplayer_installer.exe -Algorithm SHA256).Hash
          "$zipHash  rfplayer_installer.zip`n$exeHash  rfplayer_installer.exe" | Out-File -FilePath checksums_windows.txt -Encoding utf8

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: rfplayer-windows-zip
          path: rfplayer_installer.zip

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: rfplayer-windows-installer
          path: build/windows/rfplayer_installer.exe

      - name: Upload Windows checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums-windows
          path: checksums_windows.txt

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts/

      - name: Prepare release files
        run: |
          mkdir -p ./release
          cp ./artifacts/rfplayer-android-arm64-v8a/rfplayer_installer_arm64-v8a.apk ./release/
          cp ./artifacts/rfplayer-android-x86_64/rfplayer_installer_x86_64.apk ./release/
          cp ./artifacts/rfplayer-windows-zip/rfplayer_installer.zip ./release/
          cp ./artifacts/rfplayer-windows-installer/rfplayer_installer.exe ./release/
          cat ./artifacts/checksums-android/checksums_android.txt ./artifacts/checksums-windows/checksums_windows.txt > ./release/checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release/rfplayer_installer_arm64-v8a.apk
            ./release/rfplayer_installer_x86_64.apk
            ./release/rfplayer_installer.zip
            ./release/rfplayer_installer.exe
            ./release/checksums.txt
          body: |
            ## RFPlayer - 跨平台媒体播放器 / Cross-platform Media Player

            RFPlayer 是一款基于 Flutter 开发的跨平台媒体播放器，支持 Windows 和 Android 平台，可播放视频、音频和图片文件。

            RFPlayer is a cross-platform media player built with Flutter, supporting Windows and Android, capable of playing video, audio, and image files.

            ### ✨ 主要功能 / Key Features
            - 🎬 视频播放（支持 mp4, mkv, avi, mov, wmv, flv, webm 等主流格式）
            - 🎵 音频播放（支持 mp3, wav, flac, aac, ogg, opus 等格式）
            - 🖼️ 图片查看（支持 jpg, png, gif, bmp, webp, svg 等格式）
            - 📝 字幕支持（SRT, ASS, SSA, VTT 等格式）
            - 🔖 书签与播放历史
            - 📂 文件浏览器与播放队列
            - 🌐 中英文双语支持

            ---

            ### 📦 下载 / Downloads

            | 文件 / File | 平台 / Platform | 说明 / Description |
            |---|---|---|
            | `rfplayer_installer.exe` | Windows x64 | **推荐** Windows 安装程序，自动注册右键"打开方式"菜单，支持关联视频/音频/图片文件 |
            | `rfplayer_installer.zip` | Windows x64 | Windows 便携版，解压即可运行，无需安装 |
            | `rfplayer_installer_arm64-v8a.apk` | Android ARM64 | 适用于绝大多数现代 Android 手机（如骁龙、天玑等处理器） |
            | `rfplayer_installer_x86_64.apk` | Android x86_64 | 适用于 Android 模拟器或 x86_64 设备 |
            | `checksums.txt` | - | 所有文件的 SHA256 校验和，用于验证下载完整性 |

            ---

            ### 💻 系统要求 / System Requirements
            - **Windows**: Windows 10 及以上（64位）
            - **Android**: Android 5.0 (API 21) 及以上
          draft: false
          prerelease: false
