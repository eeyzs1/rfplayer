name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Remove local dependency overrides
        run: |
          python3 -c "
          import yaml
          with open('pubspec.yaml', 'r') as f:
              data = yaml.safe_load(f)
          if 'dependency_overrides' in data:
              del data['dependency_overrides']
          with open('pubspec.yaml', 'w') as f:
              yaml.dump(data, f, default_flow_style=False, sort_keys=False)
          "

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rfplayer-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Remove local dependency overrides
        shell: pwsh
        run: |
          $yaml = Get-Content pubspec.yaml -Raw
          $yaml = $yaml -replace '(?ms)dependency_overrides:.*$', ''
          Set-Content pubspec.yaml $yaml

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        run: flutter build windows --release

      - name: Compress Windows build
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath rfplayer-windows.zip
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: rfplayer-windows-zip
          path: rfplayer-windows.zip

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: rfplayer-android-apk
          path: ./artifacts/

      - name: Download Windows ZIP
        uses: actions/download-artifact@v4
        with:
          name: rfplayer-windows-zip
          path: ./artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/app-release.apk
            ./artifacts/rfplayer-windows.zip
          generate_release_notes: true
          draft: false
          prerelease: false
